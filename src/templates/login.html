<!DOCTYPE html>
<html>
<head>
    <title>ログイン</title>
</head>
<body>

<h1>TV用パワポ自動化システム</h1>

<form method="post">

    <p>ログインID</p>
    <input type="text" name="username">

    <p>パスワード</p>
    <input type="password" name="password">

    <br><br>

    <button type="submit">
        ログイン
    </button>

</form>

{% if message %}
<p>{{ message }}</p>
{% endif %}

</body>
</html>
