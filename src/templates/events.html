<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>登録済み開催スケジュール一覧</title>
    <style>
        body { font-family: sans-serif; margin: 30px; background: #f8f9fa; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h1 { font-size: 22px; margin-top: 0; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #e9ecef; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .back-link { display: inline-block; margin-top: 20px; color: #0d6efd; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>登録済み開催スケジュール一覧（DBデータ）</h1>
    <p style="color: #666; font-size: 14px;">※Excelから取り込まれた上期・下期すべてのカレンダー日程です。</p>

    <table>
        <thead>
            <tr>
                <th>日付</th>
                <th>開催場</th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="/dashboard" class="back-link">← ダッシュボードへ戻る</a>
</div>

</body>
</html>
