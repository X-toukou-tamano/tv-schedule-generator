<!DOCTYPE html>
<html>
<head>
    <title>Excelアップロード</title>
</head>
<body>

<h1>Excelアップロード</h1>

{% if message %}
<p>{{ message }}</p>
<p>取得件数: {{ count }} 件</p>
{% endif %}

<form method="post" enctype="multipart/form-data">

    <input type="file" name="excel">

    <button type="submit">
        アップロード
    </button>

</form>

<hr>

<p>
対応形式：
.xlsx
</p>

</body>
</html>
