name: Generate TV PPT

on:
  schedule:
    # JST 08:30 = UTC 23:30(前日)
    - cron: '30 23 * * *'

  workflow_dispatch:

jobs:
  generate-ppt:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate PPT
        run: |
          python src/generate_today_ppt.py

      - name: Upload PPT
        uses: actions/upload-artifact@v4
        with:
          name: tv-ppt
          path: uploads/*.pptx
